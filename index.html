<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0a0a0a; font-family: 'Helvetica Neue', Helvetica, Arial, 'Segoe UI', sans-serif; overscroll-behavior: none; height: 100%; overflow: hidden; position: fixed; inset: 0; width: 100%; }
  button, input { font-family: inherit; touch-action: manipulation; }
  button { cursor: pointer; border: none; background: none; padding: 0; }

  @keyframes tumble {
    0%   { transform: rotate(0deg) scale(1); }
    30%  { transform: rotate(-22deg) scale(1.08); }
    60%  { transform: rotate(18deg) scale(1.08); }
    100% { transform: rotate(0deg) scale(1); }
  }
  .die-face.rolling { animation: tumble 380ms ease-in-out; }

  .fd-btn { transition: transform 0.05s ease, filter 0.05s ease; }
  .fd-btn:active { transform: scale(0.96); filter: brightness(0.92); }
  .fd-wood-text { text-shadow: 0 1px 2px rgba(0,0,0,0.6); }

  .wood {
    background-color: #5c2412;
    background-image:
      linear-gradient(180deg, rgba(255,255,255,0.12), rgba(0,0,0,0.05) 40%, rgba(0,0,0,0.25)),
      repeating-linear-gradient(178deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 2px, transparent 5px),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.5'/></svg>");
    background-blend-mode: normal, normal, soft-light;
    background-size: auto, auto, 140px 140px;
  }
  .felt {
    background-color: #125c39;
    background-image:
      radial-gradient(ellipse at 30% 0%, rgba(255,255,255,0.07), transparent 60%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='0.5'/></svg>");
    background-blend-mode: normal, overlay;
    background-size: auto, 140px 140px;
  }

  .card-shell {
    width: 100%; max-width: 420px; max-height: 100%; border-radius: 16px; overflow-x: hidden; overflow-y: auto;
    -webkit-overflow-scrolling: touch; overscroll-behavior: none; position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid #2a1408;
  }
  .card-shell-game {
    flex: 1; min-height: 0; display: flex; flex-direction: column;
  }
  .page {
    height: 100vh; height: 100dvh; height: var(--app-height, 100dvh); width: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; box-sizing: border-box; overflow: hidden;
    padding: calc(16px + env(safe-area-inset-top, 0px)) 12px calc(70px + env(safe-area-inset-bottom, 0px));
  }
  .bottom-nav {
    position: fixed; left: 0; right: 0; bottom: -20px; z-index: 40;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.45);
    border-top: 1px solid rgba(0,0,0,0.4);
    padding-bottom: 20px;
  }
  .bottom-nav-inner {
    width: 100%; max-width: 420px; display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px calc(10px + env(safe-area-inset-bottom, 0px));
  }
  .scorecard-box {
    overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;
    flex: 1; min-height: 0; overscroll-behavior: none;
  }
  .felt-body-game {
    display: flex; flex-direction: column; flex: 1; min-height: 0;
  }
  .dice-roll-area {
    display: flex; flex-direction: column; flex: 1; min-height: 0;
  }

  .die-btn { width: 58px; height: 58px; position: relative; flex-shrink: 0; }
  .die-face { width: 100%; height: 100%; border-radius: 14px; position: relative; overflow: hidden; }
  .held-badge {
    position: absolute; top: -8px; right: -4px; font-size: 9px; font-weight: bold;
    letter-spacing: 0.02em; background: #F2C879; color: #5c140d; padding: 1px 4px; border-radius: 4px;
  }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
    padding: 16px; background: rgba(0,0,0,0.6);
  }
  .modal-card { width: 100%; max-width: 420px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }

<script>
/* ---------- Game data ---------- */
const CATS = [
  { key: "ones", label: "Aces", section: "upper", icon: "1", iconBg: "#8a1f16" },
  { key: "twos", label: "Twos", section: "upper", icon: "2", iconBg: "#8a1f16" },
  { key: "threes", label: "Threes", section: "upper", icon: "3", iconBg: "#8a1f16" },
  { key: "fours", label: "Fours", section: "upper", icon: "4", iconBg: "#8a1f16" },
  { key: "fives", label: "Fives", section: "upper", icon: "5", iconBg: "#8a1f16" },
  { key: "sixes", label: "Sixes", section: "upper", icon: "6", iconBg: "#8a1f16" },
  { key: "threeKind", label: "3 of a Kind", section: "lower", icon: "3K", iconBg: "#B4271B" },
  { key: "fourKind", label: "4 of a Kind", section: "lower", icon: "4K", iconBg: "#B4271B" },
  { key: "fullHouse", label: "Full House", section: "lower", icon: "\u2302", iconBg: "#B4271B" },
  { key: "smallStraight", label: "Small Straight", section: "lower", icon: "123", iconBg: "#B4271B" },
  { key: "largeStraight", label: "Large Straight", section: "lower", icon: "456", iconBg: "#B4271B" },
  { key: "yahtzee", label: "Five Dice!", section: "lower", icon: "\u2605", iconBg: "#B4271B" },
  { key: "chance", label: "Chance", section: "lower", icon: "?", iconBg: "#B4271B" },
];

function counts(dice) {
  const c = [0,0,0,0,0,0,0];
  dice.forEach((d) => c[d]++);
  return c;
}
function sum(dice) { return dice.reduce((a,b) => a+b, 0); }
function scoreFor(key, dice) {
  const c = counts(dice);
  const s = sum(dice);
  switch (key) {
    case "ones": return c[1]*1;
    case "twos": return c[2]*2;
    case "threes": return c[3]*3;
    case "fours": return c[4]*4;
    case "fives": return c[5]*5;
    case "sixes": return c[6]*6;
    case "threeKind": return c.some((n)=>n>=3) ? s : 0;
    case "fourKind": return c.some((n)=>n>=4) ? s : 0;
    case "fullHouse": {
      const vals = c.slice(1).filter((n)=>n>0);
      return (vals.includes(3) && vals.includes(2)) || (vals.length===1 && vals[0]===5) ? 25 : 0;
    }
    case "smallStraight": {
      const set = new Set(dice);
      const runs = [[1,2,3,4],[2,3,4,5],[3,4,5,6]];
      return runs.some((r)=>r.every((v)=>set.has(v))) ? 30 : 0;
    }
    case "largeStraight": {
      const set = new Set(dice);
      const runs = [[1,2,3,4,5],[2,3,4,5,6]];
      return runs.some((r)=>r.every((v)=>set.has(v)) && set.size===5) ? 40 : 0;
    }
    case "yahtzee": return c.some((n)=>n===5) ? 50 : 0;
    case "chance": return s;
    default: return 0;
  }
}
function emptyScores() {
  const o = {};
  CATS.forEach((c) => o[c.key] = null);
  return o;
}
function totalFor(scores, yahtzeeBonusCount) {
  yahtzeeBonusCount = yahtzeeBonusCount || 0;
  const upper = CATS.filter((c)=>c.section==="upper").reduce((a,c)=>a+(scores[c.key]||0), 0);
  const bonus = upper >= 63 ? 35 : 0;
  const lower = CATS.filter((c)=>c.section==="lower").reduce((a,c)=>a+(scores[c.key]||0), 0);
  const yahtzeeBonus = yahtzeeBonusCount * 100;
  return { upper, bonus, lower, yahtzeeBonus, grand: upper + bonus + lower + yahtzeeBonus };
}
function isDone(s) { return CATS.every((c) => s[c.key] !== null); }
function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

/* ---------- Sound ---------- */
let audioCtx = null;
function getCtx() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function playRollSound() {
  const ctx = getCtx(); const now = ctx.currentTime;
  for (let i = 0; i < 7; i++) {
    const t = now + i * (0.07 + Math.random()*0.03);
    const bufferSize = ctx.sampleRate * 0.03;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let j = 0; j < bufferSize; j++) data[j] = (Math.random()*2-1) * (1 - j/bufferSize);
    const src = ctx.createBufferSource(); src.buffer = buffer;
    const filter = ctx.createBiquadFilter(); filter.type = "bandpass";
    filter.frequency.value = 900 + Math.random()*600; filter.Q.value = 1.2;
    const gain = ctx.createGain(); gain.gain.value = 0.5 - i*0.03;
    src.connect(filter).connect(gain).connect(ctx.destination);
    src.start(t);
  }
}
function playHoldSound(held) {
  const ctx = getCtx(); const now = ctx.currentTime;
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.type = "triangle"; osc.frequency.setValueAtTime(held ? 520 : 340, now);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.18, now+0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now+0.1);
  osc.connect(gain).connect(ctx.destination); osc.start(now); osc.stop(now+0.12);
}
function playScoreSound() {
  const ctx = getCtx(); const now = ctx.currentTime;
  [523.25,659.25,783.99].forEach((f,i)=>{
    const t = now + i*0.06;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = "sine"; osc.frequency.value = f;
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.15, t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+0.25);
    osc.connect(gain).connect(ctx.destination); osc.start(t); osc.stop(t+0.3);
  });
}
function playYahtzeeSound() {
  const ctx = getCtx(); const now = ctx.currentTime;
  [523.25,659.25,783.99,1046.5,1318.5].forEach((f,i)=>{
    const t = now + i*0.09;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = "triangle"; osc.frequency.value = f;
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.2, t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+0.35);
    osc.connect(gain).connect(ctx.destination); osc.start(t); osc.stop(t+0.4);
  });
}
function playWinSound() {
  const ctx = getCtx(); const now = ctx.currentTime;
  [392,523.25,659.25,523.25,783.99].forEach((f,i)=>{
    const t = now + i*0.14;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = "sawtooth"; osc.frequency.value = f;
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.12, t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+0.3);
    osc.connect(gain).connect(ctx.destination); osc.start(t); osc.stop(t+0.35);
  });
}
function playSetupSound() {
  const ctx = getCtx(); const now = ctx.currentTime;
  [440,554.37].forEach((f,i)=>{
    const t = now + i*0.05;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = "sine"; osc.frequency.value = f;
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.14, t+0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+0.18);
    osc.connect(gain).connect(ctx.destination); osc.start(t); osc.stop(t+0.2);
  });
}
function sfx(fn) { if (state.soundOn) { try { fn(); } catch(e) {} } }

/* ---------- localStorage (per-device, no login) ---------- */
const HS_KEY = "fivedice-highscores";
function loadHighScores() {
  try { return JSON.parse(localStorage.getItem(HS_KEY) || "[]"); } catch(e) { return []; }
}
function saveHighScores(list) {
  try { localStorage.setItem(HS_KEY, JSON.stringify(list)); } catch(e) {}
}
function clearHighScores() {
  state.highScores = [];
  saveHighScores([]);
  render();
}
function requestClearHighScores() {
  if (state.highScores.length === 0) return;
  state.showConfirmClearScores = true;
  render();
}
function cancelClearHighScores() {
  state.showConfirmClearScores = false;
  render();
}
function confirmClearHighScores() {
  state.showConfirmClearScores = false;
  clearHighScores();
}

/* ---------- State ---------- */
const state = {
  numPlayers: null,
  setupStep: "count",
  pendingCount: null,
  pendingNames: ["", "", ""],
  names: [],
  scores: [],
  yahtzeeBonus: [],
  turn: 0,
  dice: [1,1,1,1,1],
  held: [false,false,false,false,false],
  rollsLeft: 3,
  rolling: false,
  hasRolledOnce: false,
  gameOver: false,
  highScores: loadHighScores(),
  showHighScores: false,
  showConfirmNewGame: false,
  showConfirmClearScores: false,
  savedThisGame: false,
  soundOn: true,
};

function totalsAll() {
  return state.scores.map((s,i) => totalFor(s, state.yahtzeeBonus[i] || 0));
}

/* ---------- Actions ---------- */
function chooseCount(n) {
  sfx(playSetupSound);
  state.pendingCount = n;
  state.pendingNames = Array.from({length:n}, () => "");
  state.setupStep = "names";
  render();
}
function backToCount() {
  state.setupStep = "count";
  render();
}
function onNameInput(e, i) {
  state.pendingNames[i] = e.target.value;
}
function onNameKeydown(e) {
  if (e.key === "Enter") confirmNames();
}
function confirmNames() {
  startGame(state.pendingCount, state.pendingNames);
}
function startGame(n, providedNames) {
  sfx(playSetupSound);
  const finalNames = (providedNames && providedNames.length === n)
    ? providedNames.map((nm,i) => (nm && nm.trim()) ? nm.trim() : ("Player " + (i+1)))
    : Array.from({length:n}, (_,i) => "Player " + (i+1));
  state.numPlayers = n;
  state.names = finalNames;
  state.scores = Array.from({length:n}, () => emptyScores());
  state.yahtzeeBonus = Array.from({length:n}, () => 0);
  state.turn = 0;
  state.dice = [1,1,1,1,1];
  state.held = [false,false,false,false,false];
  state.rollsLeft = 3;
  state.hasRolledOnce = false;
  state.gameOver = false;
  state.savedThisGame = false;
  render();
}
function newGame() {
  state.numPlayers = null;
  state.setupStep = "count";
  state.pendingCount = null;
  state.pendingNames = ["", "", ""];
  render();
}
function requestNewGame() {
  const gameInProgress = state.numPlayers !== null && !state.gameOver;
  if (gameInProgress) {
    state.showConfirmNewGame = true;
    render();
  } else {
    newGame();
  }
}
function cancelNewGame() {
  state.showConfirmNewGame = false;
  render();
}
function confirmNewGame() {
  state.showConfirmNewGame = false;
  newGame();
}
function playAgainSamePlayers() {
  startGame(state.numPlayers, state.names);
}
function roll() {
  if (state.rollsLeft <= 0 || state.rolling) return;
  sfx(playRollSound);
  state.rolling = true;
  render();
  setTimeout(() => {
    state.dice = state.dice.map((v,i) => state.held[i] ? v : (1 + Math.floor(Math.random()*6)));
    state.rollsLeft -= 1;
    state.hasRolledOnce = true;
    state.rolling = false;
    render();
  }, 380);
}
function toggleHold(i) {
  if (!state.hasRolledOnce || state.rollsLeft === 3) return;
  const willHold = !state.held[i];
  sfx(() => playHoldSound(willHold));
  state.held[i] = willHold;
  render();
}
function isYahtzeeRoll() { return counts(state.dice).some((n) => n === 5); }
function choose(key) {
  if (!state.hasRolledOnce) return;
  if (state.scores[state.turn][key] !== null) return;

  const yahtzeeAlreadyScored = state.scores[state.turn].yahtzee === 50;
  const grantsBonus = isYahtzeeRoll() && yahtzeeAlreadyScored;
  const pts = scoreFor(key, state.dice);

  state.scores[state.turn] = Object.assign({}, state.scores[state.turn]);
  state.scores[state.turn][key] = pts;
  if (grantsBonus) state.yahtzeeBonus[state.turn] += 1;
  sfx(isYahtzeeRoll() ? playYahtzeeSound : playScoreSound);

  const nextTurn = (state.turn + 1) % state.numPlayers;
  const allDone = state.scores.every(isDone);
  if (allDone) {
    state.gameOver = true;
    maybeSaveHighScores();
    render();
    return;
  }
  state.turn = nextTurn;
  state.dice = [1,1,1,1,1];
  state.held = [false,false,false,false,false];
  state.rollsLeft = 3;
  state.hasRolledOnce = false;
  render();
}
function maybeSaveHighScores() {
  if (state.savedThisGame) return;
  const totals = totalsAll();
  const entries = state.names.map((n,i) => ({
    name: n, score: totals[i].grand, date: new Date().toLocaleDateString()
  }));
  const merged = state.highScores.concat(entries).sort((a,b) => b.score - a.score).slice(0, 10);
  state.highScores = merged;
  state.savedThisGame = true;
  saveHighScores(merged);
  sfx(playWinSound);
}
function toggleSound() { state.soundOn = !state.soundOn; render(); }
function openHighScores() { state.showHighScores = true; render(); }
function closeHighScores() { state.showHighScores = false; render(); }

function dieHTML(idx, value, held, rolling) {
  const bg = held
    ? "radial-gradient(circle at 30% 25%, #9c3223, #7A1E14 70%)"
    : "radial-gradient(circle at 30% 25%, #d33a29, #B4271B 70%)";
  const shadow = held
    ? "inset 0 0 0 3px #F2C879, inset 0 -4px 6px rgba(0,0,0,0.35), inset 0 3px 3px rgba(255,255,255,0.15), 0 3px 0 #5c140d, 0 5px 8px rgba(0,0,0,0.35)"
    : "inset 0 -4px 6px rgba(0,0,0,0.35), inset 0 3px 3px rgba(255,255,255,0.15), 0 3px 0 #7c1a11, 0 5px 8px rgba(0,0,0,0.35)";
  const layouts = {
    1: [[50,50]],
    2: [[25,25],[75,75]],
    3: [[25,25],[50,50],[75,75]],
    4: [[25,25],[75,25],[25,75],[75,75]],
    5: [[25,25],[75,25],[50,50],[25,75],[75,75]],
    6: [[25,25],[75,25],[25,50],[75,50],[25,75],[75,75]],
  };
  const pips = layouts[value].map(function(p) {
    return '<g><circle cx="'+p[0]+'" cy="'+(p[1]+1)+'" r="8.5" fill="rgba(0,0,0,0.25)"/><circle cx="'+p[0]+'" cy="'+p[1]+'" r="8.5" fill="#F4EDE1"/><circle cx="'+(p[0]-2.5)+'" cy="'+(p[1]-2.5)+'" r="2.5" fill="#ffffff" opacity="0.6"/></g>';
  }).join("");
  const grainId = "grain-" + idx + "-" + value + "-" + (held?1:0) + "-" + (rolling?1:0);
  return (
    '<button class="die-btn" onclick="toggleHold(' + idx + ')" aria-label="Die showing ' + value + (held ? ", held" : "") + '">' +
      '<div class="die-face' + ((rolling && !held) ? " rolling" : "") + '" style="background:' + bg + ';box-shadow:' + shadow + ';">' +
        '<svg width="100%" height="100%" viewBox="0 0 100 100" style="position:absolute;inset:0;opacity:0.5;mix-blend-mode:overlay;">' +
          '<filter id="' + grainId + '"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>' +
          '<rect width="100" height="100" filter="url(#' + grainId + ')"/>' +
        '</svg>' +
        '<svg width="100%" height="100%" viewBox="0 0 100 100" style="position:relative;">' + pips + '</svg>' +
      '</div>' +
      (held ? '<span class="held-badge">HELD</span>' : "") +
    '</button>'
  );
}

function renderGame() {
  const totals = totalsAll();
  const turn = state.turn;

  const headerHTML = state.gameOver
    ? '<span class="fd-wood-text" style="color:#F2E4C8;font-weight:bold;font-size:18px;">Five Dice!</span>'
    : (
      '<span class="fd-wood-text" style="color:#F2E4C8;font-size:14px;font-weight:bold;">' + escapeHtml(state.names[turn]) + ' &middot; ' +
        (state.hasRolledOnce ? ('Roll ' + (3 - state.rollsLeft) + ' of 3') : 'Ready to roll') +
      '</span>' +
      '<span class="fd-wood-text" style="color:#F2E4C8;font-size:14px;font-weight:bold;">Score: ' + totals[turn].grand + '</span>'
    );

  const tabsHTML = state.names.map(function(n, i) {
    const active = turn === i && !state.gameOver;
    const bonusTxt = state.yahtzeeBonus[i] > 0 ? (' \u2605\u00d7' + state.yahtzeeBonus[i]) : "";
    return (
      '<div style="flex:1;text-align:center;padding:8px 0;background:' + (active ? "#F2C879" : "transparent") + ';color:' + (active ? "#5c140d" : "#EFE6D3") + ';">' +
        '<div style="font-size:14px;font-weight:bold;">' + escapeHtml(n) + '</div>' +
        '<div style="font-size:12px;opacity:0.8;">' + totals[i].grand + ' pts' + bonusTxt + '</div>' +
      '</div>'
    );
  }).join("");

  let bodyHTML;
  if (state.gameOver) {
    const maxScore = Math.max.apply(null, totals.map(function(t){return t.grand;}));
    const winners = state.names.filter(function(_, i){ return totals[i].grand === maxScore; });
    const isTie = winners.length > 1 && state.numPlayers > 1;
    const resultLine = state.numPlayers === 1
      ? "Game complete!"
      : isTie
        ? ("It's a tie! " + winners.map(escapeHtml).join(" & "))
        : (escapeHtml(winners[0]) + " wins!");
    const scoreLine = state.names.map(function(n,i){ return escapeHtml(n) + ": " + totals[i].grand; }).join("  \u00b7  ");
    bodyHTML = (
      '<div style="flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;">' +
        '<div style="text-align:center;margin-bottom:12px;padding:20px 0;border-radius:8px;background:rgba(0,0,0,0.25);border:2px solid #F2C879;">' +
          '<div style="font-size:24px;margin-bottom:4px;">&#9733;</div>' +
          '<div style="font-size:18px;font-weight:bold;color:#F2C879;">' + resultLine + '</div>' +
          '<div style="font-size:14px;margin-top:4px;color:#EFE6D3;">' + scoreLine + '</div>' +
          '<div style="display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;">' +
            '<button class="fd-btn" onclick="playAgainSamePlayers()" style="padding:8px 16px;border-radius:6px;font-size:14px;font-weight:bold;background:#B4271B;color:#F4EDE1;">Play again</button>' +
            '<button class="fd-btn" onclick="newGame()" style="padding:8px 16px;border-radius:6px;font-size:14px;font-weight:bold;background:#dcd3bd;color:#3a2a1a;">Change players</button>' +
            '<button class="fd-btn" onclick="openHighScores()" style="padding:8px 16px;border-radius:6px;font-size:14px;font-weight:bold;background:#F2C879;color:#5c140d;">Wall of Fame</button>' +
          '</div>' +
        '</div>' +
      '</div>'
    );
  } else {
    const diceHTML = state.dice.map(function(v,i) { return dieHTML(i, v, state.held[i], state.rolling); }).join("");

    const rowsHTML = CATS.map(function(c) {
      const already = state.scores[turn][c.key];
      const preview = (state.hasRolledOnce && already === null) ? scoreFor(c.key, state.dice) : null;
      const isBest = preview !== null && preview > 0;
      const bg = already !== null ? "#e9e4d8" : (isBest ? "#2E9EF5" : "#F7F3E8");
      const fg = already !== null ? "#9a927e" : (isBest ? "#ffffff" : "#3a2a1a");
      const badgeBg = already !== null ? "#b9ae95" : c.iconBg;
      const pillBg = already !== null ? "#c9c0ab" : (isBest ? "#0b6fc9" : "#dcd3bd");
      const valTxt = already !== null ? already : (preview !== null ? preview : "\u2013");
      const disabled = (already !== null || !state.hasRolledOnce);
      let row = (
        '<button ' + (disabled ? "disabled" : "") + ' onclick="choose(\'' + c.key + '\')" ' +
        'style="width:100%;display:flex;align-items:center;gap:8px;padding:6px 8px;font-size:14px;border:none;border-bottom:1px solid rgba(0,0,0,0.08);background:' + bg + ';color:' + fg + ';' + (disabled ? "cursor:default;" : "cursor:pointer;") + '">' +
          '<span style="width:30px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:4px;font-weight:bold;font-size:10px;background:' + badgeBg + ';color:#F4EDE1;">' + c.icon + '</span>' +
          '<span style="flex:1;text-align:left;font-weight:600;">' + c.label + '</span>' +
          '<span style="font-weight:bold;border-radius:9999px;padding:2px 8px;font-size:12px;min-width:30px;text-align:center;background:' + pillBg + ';">' + valTxt + '</span>' +
        '</button>'
      );
      if (c.key === "sixes") {
        row += '<div style="padding:6px 12px;font-size:12px;display:flex;justify-content:space-between;background:#efe9da;color:#5c4a30;border-bottom:1px solid rgba(0,0,0,0.08);"><span>Upper bonus (' + totals[turn].upper + '/63)</span><span style="font-weight:bold;">' + totals[turn].bonus + '</span></div>';
      }
      if (c.key === "chance") {
        row += '<div style="padding:6px 12px;font-size:12px;display:flex;justify-content:space-between;background:#efe9da;color:#5c4a30;border-bottom:1px solid rgba(0,0,0,0.08);"><span>Five Dice Bonus (+100 each)</span><span style="font-weight:bold;">' + (state.yahtzeeBonus[turn]*100) + '</span></div>';
      }
      return row;
    }).join("");

    bodyHTML = (
      '<div class="dice-roll-area">' +
        '<div style="flex-shrink:0;display:flex;justify-content:center;gap:12px;padding:24px 0;margin-bottom:12px;border-radius:12px;background:rgba(0,0,0,0.18);border:3px solid rgba(0,0,0,0.3);box-shadow:inset 0 4px 12px rgba(0,0,0,0.35);">' +
          diceHTML +
        '</div>' +
        '<div style="flex-shrink:0;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">' +
          '<span style="font-size:12px;color:#CFE8D9;">' + (state.hasRolledOnce ? "Tap dice to hold" : "Tap Roll to start your turn") + '</span>' +
          '<button class="fd-btn" onclick="roll()" ' + ((state.rollsLeft<=0||state.rolling) ? "disabled" : "") + ' style="padding:8px 20px;border-radius:6px;font-size:14px;font-weight:bold;background:#F2C879;color:#5c140d;' + ((state.rollsLeft<=0||state.rolling) ? "opacity:0.4;" : "") + '">Roll (' + state.rollsLeft + ' left)</button>' +
        '</div>' +
        '<div class="scorecard-box" style="border-radius:8px;border:2px solid rgba(0,0,0,0.3);">' +
          rowsHTML +
          '<div style="padding:8px 12px;font-size:14px;display:flex;justify-content:space-between;font-weight:bold;background:#e2d9c2;color:#3a2a1a;position:sticky;bottom:0;"><span>Grand Total</span><span>' + totals[turn].grand + '</span></div>' +
        '</div>' +
      '</div>'
    );
  }

  return (
    '<div class="page">' +
      '<div class="card-shell card-shell-game">' +
        '<div class="wood" style="flex-shrink:0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;">' + headerHTML + '</div>' +
        '<div class="felt felt-body-game" style="padding:16px 12px 12px;">' +
          '<div style="flex-shrink:0;display:flex;margin-bottom:12px;border-radius:8px;overflow:hidden;border:2px solid rgba(0,0,0,0.35);background:rgba(0,0,0,0.2);">' + tabsHTML + '</div>' +
          bodyHTML +
        '</div>' +
      '</div>' +
      (state.showHighScores ? wallOfFameModalHTML() : "") +
      (state.showConfirmNewGame ? confirmNewGameModalHTML() : "") +
      (state.showConfirmClearScores ? confirmClearScoresModalHTML() : "") +
      '<div class="wood bottom-nav">' +
        '<div class="bottom-nav-inner">' +
          '<button class="fd-btn fd-wood-text" onclick="requestNewGame()" style="color:#F2E4C8;font-size:12px;font-weight:bold;display:flex;flex-direction:column;align-items:center;gap:2px;"><span style="font-size:16px;">&#8962;</span>New Game</button>' +
          '<button class="fd-btn fd-wood-text" onclick="toggleSound()" style="color:#F2E4C8;font-size:12px;font-weight:bold;display:flex;flex-direction:column;align-items:center;gap:2px;"><span style="font-size:16px;">' + (state.soundOn ? "\u266a" : "\u266a\u0338") + '</span>Sound ' + (state.soundOn ? "On" : "Off") + '</button>' +
          '<button class="fd-btn fd-wood-text" onclick="openHighScores()" style="color:#F2E4C8;font-size:12px;font-weight:bold;display:flex;flex-direction:column;align-items:center;gap:2px;"><span style="font-size:16px;">&#9733;</span>High Scores</button>' +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

function render() {
  let html;
  if (state.numPlayers === null) {
    html = (state.setupStep === "count") ? renderSetupCount() : renderSetupNames();
  } else {
    html = renderGame();
  }
  document.getElementById("root").innerHTML = html;
}

/* Fixes a known iOS standalone-web-app quirk where 100dvh can leave a gap
   at the bottom of the screen (Add to Home Screen mode). Measures the real
   rendered viewport directly instead of trusting the CSS unit. */
function setAppHeight() {
  document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
}
window.addEventListener('resize', setAppHeight);
window.addEventListener('orientationchange', setAppHeight);
setAppHeight();

render();
</script>
</body>
</html>
